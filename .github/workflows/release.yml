name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Note
        run: bunx changelogithub --output GEN_CHANGELOG.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: GEN_CHANGELOG.md
